<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mas4U | Premium Portal</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <nav class="nav">
        <div class="nav-brand">
            <div class="nav-icon">✨</div>
            <div class="nav-title">
                <strong style="font-size: 20px; display: block;">Mas4U</strong>
                <span style="color: var(--gold); font-size: 12px;">PREMIUM ACCOUNTING</span>
            </div>
        </div>
    </nav>

    <main class="view active">
        
        <div class="banner">
            <div class="banner-info">
                <h2 style="font-size: 32px; font-weight: 900;">היי, דורית</h2>
                <p style="color: var(--slate);">הדוחות שלך מוכנים לעיון</p>
            </div>
            <div class="handler-chip">
                <div style="background: var(--gold); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--deep-blue); font-weight: bold;">ש</div>
                <div>
                    <div style="font-size: 11px; color: var(--slate);">רואה חשבון מטפל</div>
                    <div style="font-size: 14px; font-weight: 700;">שמעון מזרחי</div>
                </div>
            </div>
        </div>

        <div class="chart-ctx">
            <div class="ctx-chip">
                <div class="ctx-lbl">הכנסות חודש אפריל</div>
                <div class="ctx-val">₪45,200</div>
            </div>
            <div class="ctx-chip">
                <div class="ctx-lbl">הוצאות מוכרות</div>
                <div class="ctx-val" style="color: #fb7185;">₪12,840</div>
            </div>
            <div class="ctx-chip" style="border-color: var(--gold);">
                <div class="ctx-lbl">לשלם למע"מ (משוער)</div>
                <div class="ctx-val" style="color: var(--accent);">₪4,200</div>
            </div>
        </div>

        <div class="upload-area">
            <button class="camera-btn">
                <span>💎 צלם מסמך חדש</span>
                <input type="file" accept="image/*" capture="environment" multiple onchange="App.handleUpload(this.files)">
            </button>
        </div>

        <div id="file-list-container"></div>
    </main>

    <div class="nav-tabs">
        </div>

    <script src="./app.js"></script>
</body>
</html>
